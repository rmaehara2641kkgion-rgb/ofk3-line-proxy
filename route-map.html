<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>配送マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #1a1a2e; }
#header {
  background: #16213e;
  color: #fff;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
}
#header h1 { font-size: 16px; font-weight: 700; }
#header .route-badge {
  background: #e94560;
  color: #fff;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
}
#header .stats {
  font-size: 12px;
  color: #a0a0b0;
}
#map { position: fixed; top: 52px; bottom: 0; left: 0; right: 0; }
#loading {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  color: #fff;
}
#loading .spinner {
  width: 40px; height: 40px;
  border: 4px solid #333;
  border-top-color: #e94560;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading .msg { font-size: 14px; color: #a0a0b0; }

.pin-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  border: 2px solid #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.pin-red { background: #e94560; }
.pin-blue { background: #2196F3; }
.pin-green { background: #4CAF50; }

.leaflet-popup-content-wrapper {
  border-radius: 12px !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
}
.leaflet-popup-content { margin: 12px 16px !important; min-width: 200px; }
.popup-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #1a1a2e; }
.popup-addr { font-size: 12px; color: #666; margin-bottom: 8px; line-height: 1.4; }
.popup-order { font-size: 12px; color: #e94560; font-weight: 600; margin-bottom: 10px; }
.popup-nav {
  display: block;
  width: 100%;
  background: #4285F4;
  color: #fff;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
}
.popup-nav:active { background: #3367D6; }

#legend {
  position: fixed;
  bottom: 16px;
  left: 16px;
  background: rgba(22, 33, 62, 0.9);
  color: #fff;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 11px;
  z-index: 1000;
  display: flex;
  gap: 12px;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1px solid #fff;
}

#btn-locate {
  position: fixed;
  bottom: 16px;
  right: 16px;
  width: 44px;
  height: 44px;
  background: #fff;
  border: none;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  font-size: 20px;
  z-index: 1000;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
#btn-locate:active { background: #eee; }

#error-msg {
  position: fixed;
  top: 60px;
  left: 16px;
  right: 16px;
  background: #e94560;
  color: #fff;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 1500;
  display: none;
  text-align: center;
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="msg">配送マップを読み込み中...</div>
</div>

<div id="header">
  <div>
    <h1>🚚 OFK3配送マップ</h1>
    <div class="stats" id="stats-text"></div>
  </div>
  <div class="route-badge" id="route-badge">---</div>
</div>

<div id="map"></div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#e94560"></div> 未配達</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4CAF50"></div> 完了</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2196F3"></div> 現在地</div>
</div>

<button id="btn-locate" onclick="locateMe()">📍</button>

<div id="error-msg" id="error-msg"></div>

<script>
var map;
var markers = [];
var myLocationMarker = null;
var deliveryData = [];

function getParam(name) {
  var url = new URL(window.location.href);
  return url.searchParams.get(name) || '';
}

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 5000);
}

function createPinIcon(num, color) {
  return L.divIcon({
    className: '',
    html: '<div class="pin-icon pin-' + color + '">' + num + '</div>',
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -16]
  });
}

function buildPopup(item) {
  var navUrl = 'https://www.google.com/maps/dir/?api=1&destination='
    + encodeURIComponent(item.lat + ',' + item.lng)
    + '&travelmode=driving';
  var html = '<div class="popup-title">' + (item.order) + '. ' + (item.name || '配送先') + '</div>'
    + '<div class="popup-addr">' + item.address + '</div>'
    + '<div class="popup-order">配達順: ' + item.order + ' / ' + deliveryData.length + '</div>'
    + '<a class="popup-nav" href="' + navUrl + '" target="_blank">🧭 Googleナビ開始</a>';
  return html;
}

async function loadRouteData(routeCode) {
  // GASからルートの住所一覧を取得
  var baseUrl = window.location.origin;
  try {
    // pendingも含む全住所からルートコードでフィルタ
    // CYCLEデータはサーバー側にないので、addr-masterから全座標取得して使う
    var res = await fetch(baseUrl + '/addr-master?action=list&limit=20000');
    var data = await res.json();
    if (data.status !== 'ok' || !data.addresses) {
      showError('住所データの取得に失敗しました');
      return [];
    }
    // routeCode情報はクエリパラメータ routeData で渡す
    return data.addresses;
  } catch (e) {
    showError('通信エラー: ' + e.message);
    return [];
  }
}

async function initMap() {
  var routeCode = getParam('route') || '---';
  document.getElementById('route-badge').textContent = routeCode;

  // クエリパラメータから配送データを取得
  var routeDataParam = getParam('data');
  if (routeDataParam) {
    try {
      deliveryData = JSON.parse(decodeURIComponent(routeDataParam));
    } catch (e) {
      showError('データの読み込みに失敗');
    }
  }

  // dataパラメータがない場合、coordsパラメータから取得
  if (deliveryData.length === 0) {
    var coordsParam = getParam('coords');
    if (coordsParam) {
      try {
        var coordsList = JSON.parse(decodeURIComponent(coordsParam));
        for (var i = 0; i < coordsList.length; i++) {
          deliveryData.push({
            order: i + 1,
            name: '配送先' + (i + 1),
            address: coordsList[i].address || '',
            lat: coordsList[i].lat,
            lng: coordsList[i].lng,
            status: 'pending'
          });
        }
      } catch (e) {
        showError('座標データの読み込みに失敗');
      }
    }
  }

  if (deliveryData.length === 0) {
    document.getElementById('loading').innerHTML = '<div style="color:#e94560;font-size:16px;text-align:center;padding:20px;">配送データがありません<br><br><span style="font-size:12px;color:#a0a0b0;">アプリからCYCLEデータを読み込んでから<br>テスト送信してください</span></div>';
    return;
  }

  // 地図初期化
  map = L.map('map', {
    zoomControl: false,
    attributionControl: false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // ピン配置
  var bounds = [];
  for (var i = 0; i < deliveryData.length; i++) {
    var item = deliveryData[i];
    if (!item.lat || !item.lng) continue;

    var color = 'red';
    if (item.status === 'done') color = 'green';
    if (item.status === 'next') color = 'blue';

    var marker = L.marker([item.lat, item.lng], {
      icon: createPinIcon(item.order, color)
    }).addTo(map);

    marker.bindPopup(buildPopup(item), { maxWidth: 260 });
    markers.push(marker);
    bounds.push([item.lat, item.lng]);
  }

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [30, 30] });
  }

  document.getElementById('stats-text').textContent = deliveryData.length + '件の配送先';
  document.getElementById('loading').style.display = 'none';

  // 現在地を取得
  locateMe();
}

function locateMe() {
  if (!navigator.geolocation) {
    showError('位置情報が使えません');
    return;
  }
  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude;
    var lng = pos.coords.longitude;
    if (myLocationMarker) {
      myLocationMarker.setLatLng([lat, lng]);
    } else {
      myLocationMarker = L.marker([lat, lng], {
        icon: L.divIcon({
          className: '',
          html: '<div style="width:16px;height:16px;background:#2196F3;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(33,150,243,0.6)"></div>',
          iconSize: [16, 16],
          iconAnchor: [8, 8]
        })
      }).addTo(map);
      myLocationMarker.bindPopup('<div style="font-size:13px;font-weight:600">📍 現在地</div>');
    }
    map.setView([lat, lng], 15);
  }, function(err) {
    showError('位置情報を取得できませんでした');
  }, { enableHighAccuracy: true });
}

initMap();
</script>
</body>
</html>
